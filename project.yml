name: Tripto

options:
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1" # iPhone first (BUILD_PLAN.md §3.1, §9.2) — iPad/Mac are fast-follows, not v1.
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    # Xcode's "recommended settings" nudge, pinned here (not via the Xcode UI —
    # the .xcodeproj is generated & gitignored, so UI edits get wiped on the
    # next `xcodegen generate`). Sandboxes run-script build phases; a no-op
    # today (we have none — gen_tokens.py runs out-of-band), and if we add one
    # later it must declare its inputs/outputs, which is the correct hygiene.
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.50.0

targets:
  Tripto:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      # XcodeGen has no separate top-level "resources" target key — a single
      # target's `sources` list carries both compiled code and copied
      # resources, classified automatically by file type (docs: "Sources").
      - path: Tripto/Sources
        excludes:
          - "**/*.md" # e.g. Models/README.md — docs, not app resources
      - path: Tripto/Resources
    dependencies:
      - package: Supabase
        product: Supabase
      # PLAN-signature-layer.md §D6: embeds the widget extension into the
      # app bundle. `embed: true` is the default here (parent is `type:
      # application`) but written explicitly anyway (research §5) — a
      # forgotten `embed:` is the other real-world way an extension never
      # actually ships inside the app.
      - target: TriptoWidgets
        embed: true
    info:
      # Regenerated by `xcodegen generate` every time — see .gitignore.
      # project.yml is the single source of truth, not this file.
      path: Tripto/Generated/Info.plist
      properties:
        UIAppFonts:
          - Fraunces-Variable.ttf
          - SofiaSans-Variable.ttf
        NSCalendarsUsageDescription: "Tripto adds your bookings to your calendar when you ask it to."
        ITSAppUsesNonExemptEncryption: false
        # PLAN-signature-layer.md §D6: required for the app to start a Live
        # Activity (`Platform/LiveActivityCoordinator.swift`, W2-B) — the
        # widget extension renders/ends activities but never starts one
        # itself (research §1: starting is foreground-only, app-side).
        NSSupportsLiveActivities: true
        # Branded launch: a solid paper (light) / ink (dark) ground matching the
        # app's first frame, so there's no white flash on open. Deliberately no
        # splash imagery — Apple discourages branded launch screens.
        UILaunchScreen:
          UIColorName: LaunchBackground
        # M3: role-carrying invite links (Support/DeepLink.swift,
        # App/AppRouter.swift). The custom scheme works today with no
        # further setup — this is all it needs.
        #
        # Universal links (`https://tripto.navbytes.io/join/<token>` opening
        # the app directly, no scheme) additionally need an
        # associated-domains entitlement:
        #   com.apple.developer.associated-domains: ["applinks:tripto.navbytes.io"]
        # which in turn needs the real Apple Team ID baked into the deployed
        # AASA file (web/share-worker's APPLE_TEAM_ID var — see that repo's
        # README) *and* a signing team pinned here (today CODE_SIGN_STYLE is
        # Automatic with no team, deliberately, so the project builds for
        # anyone on the simulator with no Apple Developer account — see the
        # comment on PRODUCT_BUNDLE_IDENTIFIER below). Not wired up yet
        # because that team ID doesn't exist in this environment; TODO once
        # it does. Until then, https://tripto.navbytes.io/join/<token> still
        # works for everyone via the web `/join` interstitial's "Open in
        # Tripto" button, which hands off to the tripto:// scheme.
        CFBundleURLTypes:
          - CFBundleURLName: io.navbytes.tripto
            CFBundleURLSchemes:
              - tripto
        # iPhone-only (TARGETED_DEVICE_FAMILY 1), portrait-by-design — every
        # screen is a vertical layout. App Store validation (error 90474)
        # rejects a bundle with no UISupportedInterfaceOrientations.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      # Written into the generated .entitlements so it survives `xcodegen
      # generate` (adding the capability via Xcode's UI would be wiped).
      path: Tripto/Generated/Tripto.entitlements
      properties:
        # Sign in with Apple — the production auth path (BUILD_PLAN §3.5), the
        # app-side half of the capability enabled on the App ID.
        com.apple.developer.applesignin:
          - Default
        # Universal links (`https://tripto.navbytes.io/join/<token>` opening
        # the app directly, no scheme) — Associated Domains capability
        # enabled on the App ID 2026-07-11 (Apple Developer console), AASA
        # already served correctly (web/share-worker). This is the app-side
        # half.
        com.apple.developer.associated-domains:
          - applinks:tripto.navbytes.io
        # PLAN-signature-layer.md §D6 / research §5: shared container for
        # `TripSnapshot` — widgets/Live Activity/Spotlight/intents read
        # this, never SwiftData directly. `TriptoWidgets` below carries the
        # identical entry in its OWN entitlements file (XcodeGen does not
        # propagate entitlements across targets) — a target with this
        # capability but no `DEVELOPMENT_TEAM` is the #1 real-world cause
        # of "extension can't see the App Group container."
        com.apple.security.application-groups:
          - group.io.navbytes.tripto
    settings:
      base:
        PRODUCT_NAME: Tripto
        PRODUCT_BUNDLE_IDENTIFIER: io.navbytes.tripto
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # MUST be set at the TARGET level: XcodeGen's target setting-preset
        # injects a default "1,2" that overrides project.settings.base's "1",
        # so the app shipped as iPad-capable and App Store validation rejected
        # it (90474 — iPad multitasking requires all 4 orientations). iPad is a
        # post-v1 fast-follow (BUILD_PLAN §2) and the UI is portrait-only, so
        # iPhone-only is correct and keeps the single-orientation design valid.
        TARGETED_DEVICE_FAMILY: "1"
        # Owner's Apple Developer team — required for a signed archive and for
        # the Sign in with Apple entitlement's provisioning profile. Automatic
        # signing generates that profile (the App ID has SiwA enabled). Local
        # verify/test builds still pass CODE_SIGNING_ALLOWED=NO, which skips
        # signing and ignores both this and the entitlement entirely.
        DEVELOPMENT_TEAM: "59J9RQXYYP"
        CODE_SIGN_STYLE: Automatic

  # PLAN-signature-layer.md §D6 / research §5's exact YAML facts. One
  # extension target for both widgets and the Live Activity (research §2:
  # a `WidgetBundle` can list `StaticConfiguration`s and an
  # `ActivityConfiguration` side by side). Bundle/team/signing mirror
  # `Tripto`'s own settings above — every target touching the App Group
  # needs its own matching entitlements entry AND its own
  # `DEVELOPMENT_TEAM` (research §5's #1 real-world failure mode).
  TriptoWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TriptoWidgets/Sources
      # Compiled into BOTH targets — see each file's own doc comment for
      # why it's dependency-free (no `Data/`/`Models/`): the extension
      # never links SwiftData (D6: "Widgets never open the SwiftData
      # store").
      - path: Tripto/Sources/Platform/Shared
      - path: Tripto/Sources/Design/Tokens.swift
      - path: Tripto/Sources/Design/PaletteExtras.swift
      - path: Tripto/Resources/Fonts
    info:
      path: TriptoWidgets/Generated/Info.plist
      properties:
        # App Store validation (error 90360) requires the extension's
        # Info.plist to carry a CFBundleDisplayName.
        CFBundleDisplayName: Tripto
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        # Fraunces on widgets is the signature look (§D6) — `Typo`
        # (Tokens.swift) already degrades to the system font if
        # registration ever fails, so this is safe either way.
        UIAppFonts:
          - Fraunces-Variable.ttf
          - SofiaSans-Variable.ttf
    entitlements:
      path: TriptoWidgets/Generated/TriptoWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.navbytes.tripto
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.navbytes.tripto.widgets
        DEVELOPMENT_TEAM: "59J9RQXYYP"
        CODE_SIGN_STYLE: Automatic

  TriptoTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TriptoTests
    dependencies:
      - target: Tripto
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.navbytes.tripto.tests
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES

  # Added for the QA smoke pass (see docs/HANDOVER_2026-07-10.md) — the repo
  # had zero XCUITest coverage before this. Drives the app via the existing
  # `-uitestXxx` launch-argument hooks (App/*View.swift), not raw taps
  # through Sign in with Apple.
  TriptoUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TriptoUITests
    dependencies:
      - target: Tripto
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.navbytes.tripto.uitests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "59J9RQXYYP"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Tripto:
    build:
      targets:
        Tripto: all
        TriptoTests: [test]
        TriptoUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TriptoTests
        - TriptoUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
