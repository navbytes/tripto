name: Tripto

options:
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1" # iPhone first (BUILD_PLAN.md §3.1, §9.2) — iPad/Mac are fast-follows, not v1.
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    # Xcode's "recommended settings" nudge, pinned here (not via the Xcode UI —
    # the .xcodeproj is generated & gitignored, so UI edits get wiped on the
    # next `xcodegen generate`). Sandboxes run-script build phases; a no-op
    # today (we have none — gen_tokens.py runs out-of-band), and if we add one
    # later it must declare its inputs/outputs, which is the correct hygiene.
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.50.0

targets:
  Tripto:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      # XcodeGen has no separate top-level "resources" target key — a single
      # target's `sources` list carries both compiled code and copied
      # resources, classified automatically by file type (docs: "Sources").
      - path: Tripto/Sources
        excludes:
          - "**/*.md" # e.g. Models/README.md — docs, not app resources
      - path: Tripto/Resources
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      # Regenerated by `xcodegen generate` every time — see .gitignore.
      # project.yml is the single source of truth, not this file.
      path: Tripto/Generated/Info.plist
      properties:
        UIAppFonts:
          - Fraunces-Variable.ttf
          - SofiaSans-Variable.ttf
        NSCalendarsUsageDescription: "Tripto adds your bookings to your calendar when you ask it to."
        ITSAppUsesNonExemptEncryption: false
        # Branded launch: a solid paper (light) / ink (dark) ground matching the
        # app's first frame, so there's no white flash on open. Deliberately no
        # splash imagery — Apple discourages branded launch screens.
        UILaunchScreen:
          UIColorName: LaunchBackground
        # M3: role-carrying invite links (Support/DeepLink.swift,
        # App/AppRouter.swift). The custom scheme works today with no
        # further setup — this is all it needs.
        #
        # Universal links (`https://tripto.navbytes.io/join/<token>` opening
        # the app directly, no scheme) additionally need an
        # associated-domains entitlement:
        #   com.apple.developer.associated-domains: ["applinks:tripto.navbytes.io"]
        # which in turn needs the real Apple Team ID baked into the deployed
        # AASA file (web/share-worker's APPLE_TEAM_ID var — see that repo's
        # README) *and* a signing team pinned here (today CODE_SIGN_STYLE is
        # Automatic with no team, deliberately, so the project builds for
        # anyone on the simulator with no Apple Developer account — see the
        # comment on PRODUCT_BUNDLE_IDENTIFIER below). Not wired up yet
        # because that team ID doesn't exist in this environment; TODO once
        # it does. Until then, https://tripto.navbytes.io/join/<token> still
        # works for everyone via the web `/join` interstitial's "Open in
        # Tripto" button, which hands off to the tripto:// scheme.
        CFBundleURLTypes:
          - CFBundleURLName: io.navbytes.tripto
            CFBundleURLSchemes:
              - tripto
    settings:
      base:
        PRODUCT_NAME: Tripto
        PRODUCT_BUNDLE_IDENTIFIER: io.navbytes.tripto
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Automatic signing, but no team pinned — keeps the project buildable
        # for anyone on the simulator with no Apple Developer account wired
        # up. CI/verify builds additionally pass CODE_SIGNING_ALLOWED=NO.
        CODE_SIGN_STYLE: Automatic

  TriptoTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TriptoTests
    dependencies:
      - target: Tripto
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.navbytes.tripto.tests
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Tripto:
    build:
      targets:
        Tripto: all
        TriptoTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TriptoTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
