# Canonical SwiftLint config — default rule set only, no opt-in rules.
# Copied verbatim into sibling repos; keep this portable (no absolute
# paths, no repo-specific rule config beyond `excluded`).
#
# Rules below are disabled where the codebase's idioms (large SwiftUI
# `body` declarations, multi-trailing-closure view modifiers, short
# domain abbreviations) conflict with a default tuned for general-purpose
# Swift rather than SwiftUI. Everything else stays enabled at (or above)
# default strictness.

disabled_rules:
  # SwiftUI views legitimately grow large single declarations (a screen's
  # `var body` / the file that holds it) — enforcing generic length caps
  # here means fighting the framework's idiom, not catching a real smell.
  - file_length
  - type_body_length
  - function_body_length
  # Swift model initializers/factories commonly take more than 5 labeled
  # parameters; each one is still self-documenting at the call site.
  - function_parameter_count
  # SwiftUI's multi-trailing-closure syntax (`Button(action:) { }`,
  # `.onGeometryChange(for:of:) { }`, etc.) is the idiomatic call shape,
  # not a style smell.
  - multiple_closures_with_trailing_closure
  # Short domain abbreviations (tz, op, id-style pairs, r/g/b) read fine
  # in context; this rule flags length, not casing or clarity.
  - identifier_name
  # Only fires in a standalone dev script (scripts/gen_appicon.swift);
  # "fixing" it means changing error-handling behavior, which is a
  # semantic change, not a lint-only one.
  - force_try

# Thresholds nudged up from default to match this codebase's real (already
# reviewed) ceilings, not disabled outright — each still catches genuine
# outliers above the new line.
line_length:
  warning: 200
  error: 400
large_tuple:
  warning: 3
  error: 4
cyclomatic_complexity:
  warning: 20
  error: 30

excluded:
  - Tripto/Generated
  - TriptoWidgets/Generated
  - .build
  - DerivedData
